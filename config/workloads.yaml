# Workload definitions for Training vs. Inference architecture comparison
# CECS 530 Project 8 - Parameterized for reproducibility

# Reference model: Modern ~8B Parameter LLM (e.g. Llama 3 8B)
# Sequence length: 4096. All values are per-token unless noted.

training:
  name: "LLM-8B Training (BF16)"
  kind: training
  description: "Large-batch pre-training with data, tensor, and pipeline parallelism"

  model:
    hidden_size: 4096
    intermediate_size: 14336
    num_layers: 32
    num_attention_heads: 32
    num_key_value_heads: 8
    vocab_size: 128256

  # Parallelism configuration
  global_batch_size: 4096
  data_parallel_degree: 32
  tensor_parallel_degree: 4
  pipeline_stages: 4
  sequence_length: 4096

  # Training-specific
  has_gradients: true
  has_kv_cache: false

  # Precision
  precision: BF16

  # Operation mix (for workload characterization)
  operation_mix:
    matmul: 0.65
    attention: 0.20
    layer_norm: 0.05
    activation: 0.05
    other: 0.05

inference:
  name: "LLM-8B Inference (INT8/KV-cache)"
  kind: inference
  description: "Autoregressive generation with KV-cache streaming"

  model:
    hidden_size: 4096
    intermediate_size: 14336
    num_layers: 32
    num_attention_heads: 32
    num_key_value_heads: 8
    vocab_size: 128256

  # Parallelism configuration
  global_batch_size: 16     # Interactive, low latency
  data_parallel_degree: 1
  tensor_parallel_degree: 2 # Typical for 8B inference
  pipeline_stages: 1
  sequence_length: 4096

  # Inference-specific
  has_gradients: false
  has_kv_cache: true

  # Precision (for reporting)
  precision: INT8

  # Operation mix
  operation_mix:
    matmul: 0.60
    attention: 0.30
    layer_norm: 0.05
    activation: 0.03
    other: 0.02
