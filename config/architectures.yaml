# Architecture definitions for Training vs. Inference comparison
# CECS 530 Project 8 - Parameterized for reproducibility

# Training-optimized (e.g., H100-class GPU)
training_optimized:
  name: "Training-GPU (H100-class)"
  kind: training_opt
  description: "High peak FLOPs, high-capacity HBM, optimized for large batches"

  peak_flops_tflops: 989.0      # BF16 Tensor Cores (dense)
  mem_bandwidth_gbs: 3350.0     # ~3.35 TB/s HBM3
  tdp_watts: 700.0
  cost_usd: 30000.0

  # Parallelism support (0–1 capability score)
  data_parallel_friendly: 0.9
  tensor_parallel_friendly: 0.9
  pipeline_parallel_friendly: 0.8
  autoregressive_friendly: 0.4

  # Design notes for report
  datapath: "Deep matrix-multiply units, wide SIMD"
  memory_hierarchy: "High capacity HBM3, optimized for coarse-grained access"
  interconnect: "High-radix NVLink (900 GB/s)"

# Inference-optimized (e.g., Specialized Inference chip like Groq or custom ASIC)
inference_optimized:
  name: "Inference-ASIC (SRAM-heavy)"
  kind: inference_opt
  description: "Streaming architecture, massive on-chip SRAM, INT8/INT4"

  peak_flops_tflops: 400.0      # Specialized INT8 units
  mem_bandwidth_gbs: 15000.0    # Massive on-chip SRAM bandwidth (e.g. 15 TB/s)
  tdp_watts: 75.0
  cost_usd: 3000.0

  data_parallel_friendly: 0.2
  tensor_parallel_friendly: 0.6
  pipeline_parallel_friendly: 0.8
  autoregressive_friendly: 1.0  # Perfect for batch=1 streaming

  datapath: "Streaming deterministic tensor ALUs, INT8/INT4 optimized"
  memory_hierarchy: "No external DRAM for weights, huge distributed SRAM"
  interconnect: "On-chip deterministic routing"

# Unified (compromise design, e.g., general-purpose GPU)
unified:
  name: "Unified-GPU (L40S-class)"
  kind: unified
  description: "Balanced design, GDDR6 instead of HBM, moderate cost"

  peak_flops_tflops: 733.0      # INT8
  mem_bandwidth_gbs: 864.0      # GDDR6a
  tdp_watts: 350.0
  cost_usd: 10000.0

  data_parallel_friendly: 0.7
  tensor_parallel_friendly: 0.6
  pipeline_parallel_friendly: 0.7
  autoregressive_friendly: 0.6

  datapath: "General-purpose tensor cores (FP16/INT8)"
  memory_hierarchy: "Large L2 cache (128MB) + GDDR6"
  interconnect: "PCIe Gen4 (64 GB/s)"
